<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ridha Fahmi Junaidi | Software Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@1&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --cream: #F5F3EE;
            --card-bg: #FFFFFF;
            --card-border: rgba(0, 0, 0, 0.05);
            --dark: #18181b;
            --accent: #d97706;
            --accent-light: #fef3c7;
            --text-muted: #78716c;
            --radius-card: 2.5rem;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--cream);
            color: var(--dark);
            overflow-x: hidden;
            background-image: radial-gradient(rgba(0, 0, 0, 0.06) 1px, transparent 1px);
            background-size: 28px 28px;
        }

        .serif-italic {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
        }

        /* ── LANGUAGE MODAL ── */
        #lang-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(20, 18, 14, 0.6);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
        }

        #lang-modal.show {
            display: flex;
        }

        #lang-modal .modal-card {
            background: var(--card-bg);
            border-radius: var(--radius-card);
            padding: 3rem 3.5rem;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.18);
            text-align: center;
        }

        /* ── BENTO GRID ── */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.25rem;
        }

        /* ── CARD BASE ── */
        .bento-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-card);
            padding: 2.25rem;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .bento-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.07);
        }

        /* ── GLOSSY CARD ── */
        .glossy {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.7) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .glossy-dark {
            background: linear-gradient(135deg, rgba(28, 25, 23, 0.96) 0%, rgba(24, 24, 27, 0.88) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ── REVEAL ── */
        .reveal {
            opacity: 0;
            transform: translateY(32px);
            transition: all 0.75s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── HERO SECTION (100vh desktop) ── */
        #hero {
            grid-column: 1 / -1;
            height: 100vh;
            min-height: 620px;
            max-height: 1080px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* ONE big L-shaped grid area */
        .hero-main-grid {
            flex: 1;
            height: 90vh;
            /* Note: Overridden in mobile media query */
            display: grid;
            grid-template-columns: 1fr auto;
            grid-template-rows: 1fr 200px;
            min-height: 0;
            gap: 0;
        }

        /* The big top/left background area */
        .hero-bg-top {
            grid-column: 1 / 3;
            grid-row: 1 / 2;
            background: linear-gradient(160deg, #EDEAE3 0%, #E6E2D8 100%);
            border-radius: var(--radius-card) var(--radius-card) 0 0;
            padding: 3rem 3.5rem 2rem 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 0;
        }

        /* Bottom-left extension of the big card */
        .hero-bg-bottom-left {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            background: #E6E2D8;
            border-radius: 0 0 0 var(--radius-card);
            padding: 1.5rem 0rem 2.5rem 3.5rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Bottom-right inset cards (sitting in the cutout) */
        .hero-inset-cards {
            grid-column: 2 / 3;
            grid-row: 2 / 3;
            display: flex;
            flex-direction: row;
            gap: 1rem;
            align-items: stretch;
            padding: 0 0 0 1rem;
            flex-shrink: 0;
        }

        .hero-inset-card {
            width: 250px;
            padding: 1.75rem;
            background: white;
            border-radius: 1.5rem;
            border: 1px solid rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 180px;
        }

        .hero-inset-card.dark {
            background: linear-gradient(135deg, #1c1917ee 0%, #18181bdd 100%);
            border-color: rgba(255, 255, 255, 0.06);
        }

        /* Status bar: full-width rounded pill at the bottom */
        .hero-bar {
            /* width: 100vw; */
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            height: 68px;
            background: white;
            border-radius: 2rem;
            display: flex;
            align-items: center;
            padding: 0 3.5rem;
            gap: 1.5rem;
            border: 1px solid rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
        }

        @media (max-width: 1024px) {
            #hero {
                height: auto;
                min-height: unset;
                max-height: unset;
            }

            .hero-main-grid {
                display: flex;
                flex-direction: column;
                height: auto;
                /* Reset 90vh on mobile */
                gap: 0;
            }

            .hero-bg-top {
                border-radius: var(--radius-card) var(--radius-card) 0 0;
                padding: 2.5rem 2rem 1.5rem 2rem;
            }

            .hero-bg-bottom-left {
                border-radius: 0;
                padding: 1rem 2rem 1.5rem 2rem;
            }

            .hero-inset-cards {
                padding: 0;
                width: 100%;
                border-radius: 0 0 var(--radius-card) var(--radius-card);
                overflow: hidden;
                gap: 0;
            }

            .hero-inset-card {
                flex: 1;
                min-width: 0;
                width: auto;
                min-height: 180px;
                border-radius: 0;
            }

            .hero-bar {
                width: 100%;
                left: 0;
                transform: none;
                border-radius: var(--radius-card);
                height: auto;
                padding: 1.25rem 1.5rem;
                flex-wrap: wrap;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .hero-bg-top {
                padding: 2rem 1.5rem 1rem 1.5rem;
            }

            .hero-bg-bottom-left {
                padding: 0.75rem 1.5rem 1.25rem 1.5rem;
            }

            .hero-inset-cards {
                flex-direction: row;
                border-radius: var(--radius-card);
                overflow: visible;
                gap: 0.5rem;
            }

            .hero-inset-card {
                flex: 1;
                border-radius: var(--radius-card);
                border: 1px solid rgba(0, 0, 0, 0.06);
                min-height: 140px;
                padding: 1rem;
            }

        }

        /* ── EDUCATION ── */
        .edu-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        @media (max-width: 640px) {
            .edu-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ── FULL‑WIDTH SPANS ── */
        .col-full {
            grid-column: 1 / -1;
        }

        .col-8 {
            grid-column: span 8;
        }

        .col-4 {
            grid-column: span 4;
        }

        .col-6 {
            grid-column: span 6;
        }

        @media (max-width: 1024px) {

            .col-8,
            .col-4,
            .col-6 {
                grid-column: 1 / -1;
            }
        }

        /* ── TECH MARQUEE ── */
        .marquee-wrapper {
            overflow: hidden;
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }

        .marquee-content {
            display: flex;
            gap: 3rem;
            animation: scroll 28s linear infinite;
        }

        @keyframes scroll {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        /* ── PILL NAV ── */
        .pill-nav {
            background: rgba(24, 24, 27, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ── MOBILE HAMBURGER ── */
        #hamburger-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(24, 24, 27, 0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #hamburger-btn .bar {
            width: 18px;
            height: 2px;
            background: white;
            border-radius: 2px;
            transition: all 0.3s ease;
            transform-origin: center;
        }

        #hamburger-btn.open .bar:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        #hamburger-btn.open .bar:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        #hamburger-btn.open .bar:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        #mobile-menu {
            position: fixed;
            bottom: 72px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            z-index: 49;
            background: rgba(24, 24, 27, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            width: 200px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.2, 1, 0.3, 1);
        }

        #mobile-menu.open {
            opacity: 1;
            pointer-events: all;
            transform: translateX(-50%) translateY(0);
        }

        #mobile-menu a {
            padding: 0.75rem 1.25rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: all 0.2s;
        }

        #mobile-menu a:hover,
        #mobile-menu a.active-link {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        #mobile-menu a.cta-link {
            background: white;
            color: #09090b;
            text-align: center;
            margin-top: 0.25rem;
        }

        /* ── LANG TOGGLE ── */
        #lang-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 200;
            background: rgba(24, 24, 27, 0.88);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        @media (max-width: 768px) {
            #lang-toggle {
                top: 1rem;
                right: 1rem;
                padding: 0.4rem 0.75rem;
                font-size: 0.65rem;
            }
        }

        /* ── PORTFOLIO GRID RESPONSIVE ── */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.25rem;
        }

        .project-hero {
            grid-column: span 12;
        }

        .project-second {
            grid-column: span 12;
        }

        .project-third {
            grid-column: span 12;
        }

        .project-fourth {
            grid-column: span 12;
        }

        .project-fifth {
            grid-column: span 12;
            min-height: 120px;
        }

        @media (min-width: 768px) {
            .project-hero {
                grid-column: span 12;
            }

            .project-second {
                grid-column: span 12;
            }

            .project-third {
                grid-column: span 6;
            }

            .project-fourth {
                grid-column: span 6;
            }

            .project-fifth {
                grid-column: span 12;
            }
        }

        @media (min-width: 1024px) {
            .portfolio-grid {
                grid-template-columns: repeat(12, 1fr);
                gap: 1.25rem;
            }

            .project-hero {
                grid-column: span 8;
                grid-row: span 2;
            }

            .project-second {
                grid-column: span 4;
            }

            .project-third {
                grid-column: span 4;
                grid-row: 2;
            }

            .project-fourth {
                grid-column: span 4;
            }

            .project-fifth {
                grid-column: span 4;
            }
        }

        #lang-toggle:hover {
            background: rgba(217, 119, 6, 0.9);
        }

        #lang-toggle .flag {
            font-size: 1rem;
        }

        /* ── PORTFOLIO GRID ── */
        .portfolio-grid {
            grid-column: 1 / -1;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: auto;
            gap: 1.25rem;
        }

        .project-hero {
            grid-column: 1 / 8;
        }

        .project-second {
            grid-column: 8 / -1;
        }

        .project-third {
            grid-column: 1 / 5;
        }

        .project-fourth {
            grid-column: 5 / 9;
        }

        .project-fifth {
            grid-column: 9 / -1;
        }

        @media (min-width: 1024px) {
            .portfolio-grid {
                grid-template-columns: repeat(12, 1fr);
                gap: 1.25rem;
            }

            .project-hero {
                grid-column: span 8;
                grid-row: span 2;
            }

            .project-second {
                grid-column: span 4;
            }

            .project-third {
                grid-column: span 4;
                grid-row: span 2;
            }

            .project-fourth {
                grid-column: span 5;
            }

            .project-fifth {
                grid-column: span 3;
            }
        }

        /* ── GLOSSY SHINE OVERLAY ── */
        .glossy::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, transparent 60%);
            pointer-events: none;
            border-radius: inherit;
        }
    </style>
</head>

<body class="p-4 md:p-6 lg:p-10 pb-32">

    <!-- Language Modal -->
    <div id="lang-modal">
        <div class="modal-card">
            <div class="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="globe" class="w-7 h-7 text-amber-600"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-zinc-900 mb-2">Choose Language</h2>
            <p class="text-sm text-zinc-400 font-medium mb-8">Pilih bahasa tampilan / Select display language</p>
            <div class="flex gap-4">
                <button onclick="setLang('id')"
                    class="flex-1 py-4 bg-zinc-950 text-white rounded-2xl font-bold text-sm hover:bg-amber-600 transition-all active:scale-95">
                    🇮🇩 &nbsp;Bahasa Indonesia
                </button>
                <button onclick="setLang('en')"
                    class="flex-1 py-4 bg-zinc-100 text-zinc-800 rounded-2xl font-bold text-sm hover:bg-amber-50 border border-black/5 transition-all active:scale-95">
                    🇬🇧 &nbsp;English
                </button>
            </div>
        </div>
    </div>

    <!-- Language Toggle Button -->
    <button id="lang-toggle" onclick="toggleLang()">
        <span class="flag" id="lang-flag">🇮🇩</span>
        <span id="lang-label">ID</span>
    </button>

    <main class="max-w-7xl mx-auto bento-grid" id="main-grid"></main>

    <!-- Floating Navigation: Pill on desktop, hamburger on mobile -->
    <nav class="fixed md:bottom-auto md:top-14 left-1/2 -translate-x-1/2 z-50 hidden md:block">
        <div class="pill-nav flex items-center gap-1 p-1.5 rounded-full shadow-2xl">
            <a href="#hero"
                class="px-5 py-2 text-xs font-bold text-white/50 hover:text-white transition-all rounded-full nav-link"
                data-key="nav_home">Beranda</a>
            <a href="#experience"
                class="px-5 py-2 text-xs font-bold text-white/50 hover:text-white transition-all rounded-full nav-link"
                data-key="nav_career">Karier</a>
            <a href="#projects"
                class="px-5 py-2 text-xs font-bold text-white/50 hover:text-white transition-all rounded-full nav-link"
                data-key="nav_projects">Proyek</a>
            <a href="#contact"
                class="px-6 py-2 text-xs bg-white text-zinc-950 rounded-full font-extrabold hover:scale-105 active:scale-95 transition-all nav-link"
                data-key="nav_contact">Kontak</a>
        </div>
    </nav>

    <!-- Mobile hamburger -->
    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3 md:hidden">
        <!-- Mobile menu panel -->
        <div id="mobile-menu">
            <a href="#hero" class="nav-link" data-key="nav_home" onclick="closeMobileMenu()">Beranda</a>
            <a href="#experience" class="nav-link" data-key="nav_career" onclick="closeMobileMenu()">Karier</a>
            <a href="#projects" class="nav-link" data-key="nav_projects" onclick="closeMobileMenu()">Proyek</a>
            <a href="#contact" class="cta-link nav-link" data-key="nav_contact" onclick="closeMobileMenu()">Kontak</a>
        </div>
        <!-- Hamburger button -->
        <button id="hamburger-btn" onclick="toggleMobileMenu()" aria-label="Menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </div>


    <!-- PROJECT MODAL -->
    <div id="project-modal"
        class="fixed inset-0 z-[100] bg-zinc-950/80 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300 flex items-center justify-center p-4">
        <!-- Close overlay -->
        <div class="absolute inset-0 cursor-pointer" onclick="closeProjectModal()"></div>
        <!-- Modal content -->
        <div class="bg-white max-w-2xl w-full max-h-[90vh] overflow-y-auto rounded-[2.5rem] p-8 md:p-12 relative transform translate-y-8 transition-all duration-300 styled-scrollbar"
            id="project-modal-content">
            <button onclick="closeProjectModal()"
                class="absolute top-6 right-6 w-10 h-10 bg-stone-100 rounded-full flex items-center justify-center text-stone-500 hover:bg-zinc-900 hover:text-white transition-colors z-10">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
            <div id="modal-tag" class="text-[10px] font-black tracking-[0.3em] uppercase text-amber-600 mb-4"></div>
            <h2 id="modal-title" class="text-3xl md:text-5xl font-extrabold tracking-tight text-zinc-900 mb-6"></h2>

            <!-- Gallery -->
            <div id="modal-gallery" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6"></div>

            <p id="modal-desc" class="text-sm md:text-base text-stone-500 leading-relaxed mb-8"></p>
            <div id="modal-tech" class="flex flex-wrap gap-2 mb-8"></div>
            <a href="#"
                class="inline-flex items-center gap-2 px-6 py-3.5 bg-zinc-900 text-white rounded-full text-xs font-bold uppercase tracking-widest hover:bg-amber-600 active:scale-95 transition-all shadow-md">
                Visit Project <i data-lucide="external-link" class="w-4 h-4"></i>
            </a>
        </div>
    </div>

    <script>
        // Project Modal logic
        function openProjectModal(index) {
            // Get data from portfolioData based on the JS object populated earlier
            const project = portfolioData.projects[index];
            const L = i18n[currentLang];
            const desc = L.project_descs[index];

            document.getElementById('modal-tag').textContent = project.tag;
            document.getElementById('modal-title').textContent = project.title;
            document.getElementById('modal-desc').innerHTML = desc; // allow basic HTML text in description

            // Populate Gallery
            const galleryHtml = (project.images || []).map(img => `<img src="${img}" alt="Project screenshot" class="w-full h-48 md:h-64 object-cover rounded-2xl border border-black/5 shadow-sm">`).join('');
            document.getElementById('modal-gallery').innerHTML = galleryHtml;

            const techHtml = project.tech.map(t => `<span class="px-3 py-1 border border-stone-200 text-stone-500 text-[10px] font-bold rounded-xl">${t}</span>`).join('');
            document.getElementById('modal-tech').innerHTML = techHtml;

            const modal = document.getElementById('project-modal');
            const content = document.getElementById('project-modal-content');

            modal.classList.remove('opacity-0', 'pointer-events-none');
            content.classList.remove('translate-y-8');
            lucide.createIcons();

            // disable body scroll
            document.body.style.overflow = 'hidden';
        }

        function closeProjectModal() {
            const modal = document.getElementById('project-modal');
            const content = document.getElementById('project-modal-content');

            modal.classList.add('opacity-0', 'pointer-events-none');
            content.classList.add('translate-y-8');

            setTimeout(() => {
                document.getElementById('modal-gallery').innerHTML = ''; // clear out images so they dont flash next time
                content.scrollTop = 0; // reset scroll position
            }, 300);

            // enable body scroll
            document.body.style.overflow = '';
        }

        // ── i18n ──────────────────────────────────────────────────────────────────
        const i18n = {
            id: {
                nav_home: 'Beranda', nav_career: 'Karier', nav_projects: 'Proyek', nav_contact: 'Kontak',
                role: 'Software Engineer',
                degree: 'S1 Ilmu Komputer',
                summary: 'Lulusan Ilmu Komputer dengan <strong class="text-zinc-900">rekam jejak terbukti</strong> dalam merancang arsitektur sistem dan <strong class="text-zinc-900">pengembangan fullstack</strong>. Berpengalaman <strong class="text-zinc-900">memimpin tim</strong>, memangkas waktu load sistem hingga 30%, dan membangun <strong class="text-zinc-900">solusi digital skalabel</strong> dari MVP hingga tingkat Enterprise.',
                about_label: 'Tentang Saya',
                focus_label: 'Fokus Utama',
                download_cv: 'Unduh CV',
                contact_me: 'Hubungi Saya',
                focus_text: 'Optimasi Arsitektur Database & Solusi Cloud Berkinerja Tinggi',
                active: 'Aktif',
                years: 'Tahun',
                experience_label: 'Pengalaman',

                <!-- Hulutalent — LARGEST card -->
                <div onclick="openProjectModal(0)" class="project-hero bento-card border-none overflow-hidden group cursor-pointer relative" style="min-height: 340px; background-image: url('https://picsum.photos/800/600?random=1'); background-size: cover; background-position: center;">
                    <div class="absolute inset-0 bg-zinc-950/80 group-hover:bg-zinc-950/90 transition-colors duration-500"></div>
                    <div class="h-full flex flex-col justify-between relative z-10 text-white">
                        <div class="flex justify-between items-start">
                            <span class="text-[9px] font-black text-stone-400 uppercase tracking-[0.3em]">${portfolioData.projects[0].tag}</span>
                            <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-amber-500 group-hover:border-amber-500 transition-all duration-500">
                                <i data-lucide="arrow-up-right" class="w-5 h-5"></i>
                            </div>
                        </div>
                        <div>
                            <h4 class="text-4xl md:text-5xl font-extrabold tracking-tight text-white group-hover:text-amber-400 transition-colors leading-tight mb-4">${portfolioData.projects[0].title}</h4>
                            <p class="text-sm text-stone-300 leading-relaxed mb-6 block md:max-w-md">${L.project_descs[0]}</p>
                            <div class="flex flex-wrap gap-2">
                                ${portfolioData.projects[0].tech.map(t => `<span class="px-3 py-1 bg-white/10 border border-white/10 text-stone-200 text-[9px] font-bold rounded-xl backdrop-blur-md">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- LMS — second card -->
                <div onclick="openProjectModal(1)" class="project-second bento-card border-none group cursor-pointer relative overflow-hidden" style="min-height: 340px; background-image: url('https://picsum.photos/800/600?random=2'); background-size: cover; background-position: center;">
                    <div class="absolute inset-0 bg-stone-900/40 backdrop-blur-sm group-hover:bg-stone-900/60 transition-all duration-500"></div>
                    <div class="h-full flex flex-col justify-between relative z-10 text-white">
                        <div class="flex justify-between items-start">
                            <span class="text-[9px] font-black text-stone-300 uppercase tracking-[0.3em]">${portfolioData.projects[1].tag}</span>
                            <div class="w-9 h-9 rounded-full border border-white/20 flex items-center justify-center group-hover:bg-amber-500 group-hover:border-amber-500 transition-all duration-500">
                                <i data-lucide="arrow-up-right" class="w-4 h-4 text-white"></i>
                            </div>
                        </div>
                        <div>
                            <h4 class="text-2xl md:text-3xl font-extrabold tracking-tight text-white group-hover:text-amber-400 transition-colors leading-tight mb-3 drop-shadow-md">${portfolioData.projects[1].title}</h4>
                            <p class="text-xs text-stone-200 leading-relaxed mb-5 drop-shadow-md">${L.project_descs[1]}</p>
                            <div class="flex flex-wrap gap-1.5">
                                ${portfolioData.projects[1].tech.map(t => `<span class="px-3 py-1 bg-white/10 border border-white/10 text-stone-200 text-[9px] font-bold rounded-xl backdrop-blur-md">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- POS — third card -->
                <div onclick="openProjectModal(2)" class="project-third bento-card relative overflow-hidden border-none group cursor-pointer text-white" style="background-image: url('https://picsum.photos/400/400?random=3'); background-size: cover; background-position: center;">
                    <div class="absolute inset-0 bg-stone-900/60 group-hover:bg-stone-900/70 transition-all duration-500"></div>
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[9px] font-black text-amber-400 uppercase tracking-[0.3em]">${portfolioData.projects[2].tag}</span>
                            <div class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center group-hover:bg-amber-500 transition-all duration-500">
                                <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                            </div>
                        </div>
                        <h4 class="text-xl font-extrabold tracking-tight text-white group-hover:text-amber-400 transition-colors mb-2">${portfolioData.projects[2].title}</h4>
                        <p class="text-xs text-stone-300 leading-relaxed mb-4">${L.project_descs[2]}</p>
                        <div class="flex flex-wrap gap-1.5">
                            ${portfolioData.projects[2].tech.map(t => `<span class="px-2.5 py-1 bg-white/10 backdrop-blur border border-white/10 text-stone-200 text-[9px] font-bold rounded-lg">${t}</span>`).join('')}
                        </div>
                    </div>
                </div>

                <!-- FilesGI — smallest card -->
                <div onclick="openProjectModal(3)" class="project-fourth bento-card relative overflow-hidden text-white border-none group cursor-pointer" style="background-image: url('https://picsum.photos/400/400?random=4'); background-size: cover; background-position: center;">
                    <div class="absolute inset-0 bg-stone-900/70 group-hover:bg-stone-900/80 transition-all duration-500"></div>
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-[9px] font-black text-stone-400 uppercase tracking-[0.3em]">${portfolioData.projects[3].tag}</span>
                            <div class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center group-hover:bg-amber-500 group-hover:border-amber-500 transition-all duration-500">
                                <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                            </div>
                        </div>
                        <h4 class="text-xl font-extrabold tracking-tight text-white group-hover:text-amber-400 transition-colors mb-2">${portfolioData.projects[3].title}</h4>
                        <p class="text-xs text-stone-400 leading-relaxed mb-4 line-clamp-2">${L.project_descs[3]}</p>
                        <div class="flex flex-wrap gap-1.5">
                            ${portfolioData.projects[3].tech.map(t => `<span class="px-2.5 py-1 bg-white/10 border border-white/10 backdrop-blur text-stone-300 text-[9px] font-bold rounded-lg">${t}</span>`).join('')}
                        </div>
                    </div>
                </div>

                <!-- Empty 5th slot — can be "View all" -->
                <div class="project-fifth bento-card bg-stone-100/50 border-dashed border-stone-200 flex flex-col items-center justify-center text-center group cursor-pointer hover:bg-stone-100 transition-all">
                    <div class="w-12 h-12 rounded-2xl bg-white flex items-center justify-center mb-3 shadow-sm group-hover:shadow-md transition-all">
                        <i data-lucide="arrow-right" class="w-5 h-5 text-stone-400"></i>
                    </div>
                    <p class="text-xs font-bold text-stone-400 uppercase tracking-widest">More Projects</p>
                </div>
            </div>

            <!-- 7. CONTACT -->
            <div id="contact" class="reveal col-full bento-card bg-white overflow-hidden p-6 md:p-10">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-16">
                    <div>
                        <h2 class="text-5xl md:text-6xl serif-italic leading-[0.9] italic mb-8 text-zinc-900">
                            ${L.contact_title.split('\n').join('<br>')}
                        </h2>
                        <p class="text-sm md:text-base text-stone-400 font-medium mb-10">ridhofahmij225@gmail.com</p>
                        <div class="flex gap-3">
                            <a href="#" class="w-12 h-12 rounded-full border border-black/5 flex items-center justify-center hover:bg-zinc-950 hover:text-white transition-all shadow-sm"><i data-lucide="github" class="w-5 h-5"></i></a>
                            <a href="#" class="w-12 h-12 rounded-full border border-black/5 flex items-center justify-center hover:bg-zinc-950 hover:text-white transition-all shadow-sm"><i data-lucide="linkedin" class="w-5 h-5"></i></a>
                            <a href="#" class="w-12 h-12 rounded-full border border-black/5 flex items-center justify-center hover:bg-zinc-950 hover:text-white transition-all shadow-sm"><i data-lucide="instagram" class="w-5 h-5"></i></a>
                        </div>
                    </div>
                    <form class="space-y-4 bg-stone-50 p-6 md:p-8 rounded-[2rem] border border-black/[0.03]">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="space-y-1.5">
                                <label class="text-[9px] font-black uppercase text-stone-400 ml-1">${L.contact_name}</label>
                                <input type="text" placeholder="${L.contact_name_ph}" class="w-full bg-white border border-black/5 rounded-xl p-3.5 text-sm outline-none focus:border-amber-400 transition-colors">
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-[9px] font-black uppercase text-stone-400 ml-1">${L.contact_email_label}</label>
                                <input type="email" placeholder="example@mail.com" class="w-full bg-white border border-black/5 rounded-xl p-3.5 text-sm outline-none focus:border-amber-400 transition-colors">
                            </div>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[9px] font-black uppercase text-stone-400 ml-1">${L.contact_msg}</label>
                            <textarea rows="4" placeholder="${L.contact_msg_ph}" class="w-full bg-white border border-black/5 rounded-xl p-3.5 text-sm outline-none focus:border-amber-400 transition-colors resize-none"></textarea>
                        </div>
                        <button class="w-full py-4 bg-zinc-950 text-white rounded-xl font-bold hover:bg-amber-600 active:scale-[0.98] transition-all flex items-center justify-center gap-3 text-xs uppercase tracking-widest shadow-md">
                            ${L.contact_send} <i data-lucide="send" class="w-3.5 h-3.5"></i>
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-full text-center py-20 opacity-20 text-[9px] font-black tracking-[0.5em] uppercase">${L.footer}</div>
        `;

            lucide.createIcons();
            handleReveal();
            setInterval(updateClock, 1000);
            updateClock();

            // Update nav labels
            document.querySelectorAll('.nav-link[data-key]').forEach(el => {
                const key = el.dataset.key;
                if (L[key]) el.textContent = L[key];
            });
            // Re-add contact label since it gets overwritten
            const contactNav = document.querySelector('.nav-link[data-key="nav_contact"]');
            if (contactNav) contactNav.textContent = L.nav_contact;
        }

        function handleReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => entry.target.classList.add('active'), index * 80);
                    }
                });
            }, { threshold: 0.08 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('portfolio_lang');
            if (!saved) {
                // Show modal
                const modal = document.getElementById('lang-modal');
                modal.classList.add('show');
                lucide.createIcons();
            } else {
                setLang(saved);
            }
        });
    </script>
</body>

</html>
